<h1>Radera inleveranser</h1>

<p>Du tar bort en inleverans genom att du markerar önskad inleverans i listan över inleveranser och trycker på knappen "Radera valda</p>
<p>inleveranser". Du får ett varningsmeddelande när du trycker på knappen "Radera" och du kan därmed ångra din innan inleveransen raderas.</p>

<h1>Radera kontoplan</h1>

<p>Du tar bort en kontoplan genom att du markerar önskad kontoplan i listan över kontoplaner och trycker på knappen "Radera vald kontoplan".</p>
<p>Du får ett varningsmeddelande när du trycker på knappen "Radera vald kontoplan" och du kan därmed ångra din innan kontoplanen raderas.</p>

name: Java CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_and_test:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Set up JDK
      uses: actions/setup-java@3a4f6efd7e13c7d7dd07a6b1a15cebfdffb2c4ab  # v4.7.1
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build and test
      run: mvn clean install -Pcoverage

    - name: Upload coverage report
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@b4b15a8e9b72b0d5b45d0d8a2c3e8b1f7a3b6c5d  # v4.6.2
      with:
        name: jacoco-report
        path: target/site/jacoco/

    - name: Run Checkstyle
      if: runner.os == 'Linux'
      run: mvn checkstyle:check -q
      continue-on-error: true

  build_and_publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Set up JDK
      uses: actions/setup-java@3a4f6efd7e13c7d7dd07a6b1a15cebfdffb2c4ab  # v4.7.1
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Test
      run: mvn test -Pcoverage

    - name: Build
      shell: bash
      run: |
        # Sanitize version for jpackage: strip -SNAPSHOT, ensure 3 numeric components.
        # Master builds are packaged as a separate "Bokfri Dev" app so testers
        # can install or keep them side-by-side with official Bokfri releases.
        RAW=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        BASE="${RAW%-SNAPSHOT}"
        IFS=. read -r MAJOR MINOR PATCH <<< "$BASE"
        MAJOR="${MAJOR:-0}"
        MINOR="${MINOR:-0}"
        PATCH="${PATCH:-0}"
        APP_NAME="Bokfri"
        APP_BASENAME="Bokfri"
        APP_SUBDIR="bokfri"
        MAC_PACKAGE_IDENTIFIER="org.fribok.bookkeeping"
        VERSION="${MAJOR}.${MINOR}.${PATCH}"

        if [[ "$GITHUB_REF" == "refs/heads/master" ]]; then
          APP_NAME="Bokfri Dev"
          APP_BASENAME="Bokfri-Dev"
          APP_SUBDIR="bokfri-dev"
          MAC_PACKAGE_IDENTIFIER="org.fribok.bookkeeping.dev"
          VERSION="${MAJOR}.${MINOR}.${GITHUB_RUN_NUMBER}"
        fi

        {
          echo "APP_NAME=$APP_NAME"
          echo "APP_BASENAME=$APP_BASENAME"
        } >> "$GITHUB_ENV"

        mvn clean package -DskipTests -Djpackage.profile=true \
          -Djpackage.name="$APP_NAME" \
          -Djpackage.appVersion="$VERSION" \
          -Djpackage.appSubdir="$APP_SUBDIR" \
          -Djpackage.macPackageIdentifier="$MAC_PACKAGE_IDENTIFIER"

    - name: List dist contents
      shell: bash
      run: ls -lR dist/ || echo "dist/ directory not found"

    # --- Linux steps ---
    - name: Install libfuse2
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libfuse2

    - name: Create AppImage
      if: runner.os == 'Linux'
      working-directory: dist
      run: |
        # Create AppDir structure from jpackage app-image.
        APPDIR="${APP_BASENAME}.AppDir"
        mkdir -p "$APPDIR/usr"
        cp -r "$APP_NAME"/* "$APPDIR/usr/"

        # Create AppRun script.
        cat > "$APPDIR/AppRun" <<EOF
        #!/bin/bash
        SELF=\$(readlink -f "\$0")
        HERE=\${SELF%/*}
        exec "\${HERE}/usr/bin/${APP_NAME}" "\$@"
        EOF
        chmod +x "$APPDIR/AppRun"

        # Create .desktop file.
        cat > "$APPDIR/${APP_BASENAME}.desktop" <<EOF
        [Desktop Entry]
        Name=${APP_NAME}
        Exec=${APP_BASENAME}
        Icon=bokfri
        Type=Application
        Categories=Office;Finance;
        EOF

        # Copy icon.
        cp ../design/favicons/desktop/icon-512x512.png "$APPDIR/bokfri.png"

        # Download and run appimagetool.
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        ARCH=x86_64 ./appimagetool-x86_64.AppImage "$APPDIR" "${APP_BASENAME}-x86_64.AppImage"

    - name: Upload Linux artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@b4b15a8e9b72b0d5b45d0d8a2c3e8b1f7a3b6c5d  # v4.6.2
      with:
        name: ${{ github.ref == 'refs/heads/master' && 'bokfri-linux-dev' || 'bokfri-linux' }}
        path: ${{ github.ref == 'refs/heads/master' && 'dist/Bokfri-Dev-x86_64.AppImage' || 'dist/Bokfri-x86_64.AppImage' }}

    # --- Windows steps ---
    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@b4b15a8e9b72b0d5b45d0d8a2c3e8b1f7a3b6c5d  # v4.6.2
      with:
        name: ${{ github.ref == 'refs/heads/master' && 'bokfri-windows-dev' || 'bokfri-windows' }}
        path: dist/*.msi

    # --- macOS steps ---
    - name: Upload macOS artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@b4b15a8e9b72b0d5b45d0d8a2c3e8b1f7a3b6c5d  # v4.6.2
      with:
        name: ${{ github.ref == 'refs/heads/master' && 'bokfri-macos-dev' || 'bokfri-macos' }}
        path: dist/*.dmg

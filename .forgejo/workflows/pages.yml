name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.forgejo/workflows/pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: codeberg-small
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to pages branch
      run: |
        REPO="https://codeberg.org/viblo-ai/bokfri.git"
        # Use CI token if available, else rely on default permissions
        if [ -n "${CI_TOKEN}" ]; then
          REPO="https://viblo-ai:${CI_TOKEN}@codeberg.org/viblo-ai/bokfri.git"
        fi

        # Work in a temp directory for the pages branch
        TMP=$(mktemp -d)
        cp -r website/* "${TMP}/"
        cd "${TMP}"

        git init
        git checkout -b pages
        git config user.name "CI Bot"
        git config user.email "ci@bokfri.viblo.se"
        git add .
        git commit -m "Deploy website $(date -Iseconds)" || exit 0
        git push -f "${REPO}" pages
      shell: bash
name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'doc/helpjar/html/**'
      - '.forgejo/workflows/pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: codeberg-small
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Prepare site
      run: |
        # Bygg ihop landningssidan och hjälpdokumentationen
        mkdir -p _deploy

        # Landningssida
        cp -r website/* _deploy/

        # Hjälpdokumentation (från JavaHelp)
        if [ -d "doc/helpjar/html" ]; then
          mkdir -p _deploy/help
          cp -r doc/helpjar/html/* _deploy/help/
        fi

        echo "Site contents:"
        find _deploy -type f | sort | head -30

    - name: Deploy to Codeberg Pages
      uses: https://codeberg.org/git-pages/action@v2
      with:
        site: https://${{ forge.repository_owner }}.codeberg.page/bokfri/
        token: ${{ forge.token }}
        source: _deploy/
name: Runner Diagnostic

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: codeberg-medium
    steps:
    - name: System info
      run: |
        echo "=== OS ==="
        cat /etc/os-release 2>/dev/null || true
        echo "=== Kernel ==="
        uname -a
        echo "=== Arch ==="
        arch
        echo "=== Java ==="
        java -version 2>&1 || echo "NO JAVA"
        echo "=== Maven ==="
        mvn --version 2>&1 || echo "NO MAVEN"
        echo "=== Available tools ==="
        which curl wget git node npm python3 || true
        echo "=== Disk ==="
        df -h /
        echo "=== Memory ==="
        free -m
        echo "=== PATH ==="
        echo $PATH
name: Java CI (Codeberg)

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: codeberg-medium
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Verify Java
      run: java -version

    - name: Verify Maven
      run: mvn --version

    - name: Compile
      run: mvn compile -q

    - name: Test
      run: mvn test -Pcoverage

    - name: Run Checkstyle
      run: mvn checkstyle:check -q
      continue-on-error: true

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/